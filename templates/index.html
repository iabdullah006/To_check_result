<!DOCTYPE html>
<html>
<head>
<title>Smart Result Checker - BISE Sahiwal 2026</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:       #080c14;
    --card:     rgba(255,255,255,0.05);
    --border:   rgba(255,255,255,0.08);
    --cyan:     #00e5ff;
    --green:    #00e676;
    --amber:    #ffb300;
    --red:      #ff1744;
    --text:     #e8eaed;
    --muted:    #8a9bb5;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 24px 16px;
    color: var(--text);
    background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,229,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,230,118,0.05) 0%, transparent 50%);
}

.container { max-width: 480px; margin: 0 auto; }

/* ── Header ── */
.header {
    text-align: center;
    margin-bottom: 28px;
}
.header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header .sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
}
.badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin: 0 3px;
    font-family: 'JetBrains Mono', monospace;
}
.badge-cyan  { background: rgba(0,229,255,0.15); color: var(--cyan);  border: 1px solid rgba(0,229,255,0.3); }
.badge-green { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }

/* ── Card ── */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    backdrop-filter: blur(12px);
}

.info-box {
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--cyan);
    margin-bottom: 20px;
    line-height: 1.6;
}

/* ── Form Elements ── */
.field {
    margin-bottom: 12px;
}
.field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
}
.field select,
.field input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Space Grotesk', sans-serif;
    outline: none;
    transition: border-color 0.2s;
}
.field select:focus,
.field input:focus {
    border-color: var(--cyan);
}
.field select option { background: #1a2030; }

.btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.3px;
}
.btn-primary {
    background: linear-gradient(135deg, #00b4d8, #0072ff);
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,114,255,0.3);
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,114,255,0.4); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-danger {
    background: rgba(255,23,68,0.15);
    border: 1px solid rgba(255,23,68,0.4);
    color: var(--red);
    margin-top: 14px;
}
.btn-danger:hover { background: rgba(255,23,68,0.25); }

/* ── Status Card ── */
.status-card {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    overflow: hidden;
}

.status-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
}

.status-pill {
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}
.pill-waiting  { background: rgba(255,179,0,0.15);  color: var(--amber); border: 1px solid rgba(255,179,0,0.3);  animation: pulse 2s infinite; }
.pill-checking { background: rgba(0,229,255,0.15);  color: var(--cyan);  border: 1px solid rgba(0,229,255,0.3);  animation: pulse 0.8s infinite; }
.pill-done     { background: rgba(0,230,118,0.15);  color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
.pill-stopped  { background: rgba(255,255,255,0.07); color: var(--muted); border: 1px solid var(--border); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

.attempt-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--cyan);
}

/* Stats row */
.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}
.stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}
.stat-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
}
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Waiting animation */
.phase-center {
    text-align: center;
    padding: 16px 0;
}
.big-icon {
    font-size: 44px;
    margin-bottom: 10px;
    display: block;
    animation: bob 1.4s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.phase-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
}
.phase-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
}

/* Result items */
.result-list { margin-top: 4px; }
.result-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.subject { font-weight: 700; color: var(--cyan); font-size: 13px; margin-bottom: 4px; }
.marks   { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.marks span { color: var(--text); }

.total-box {
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,114,255,0.15));
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    margin-top: 12px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--cyan);
}

.spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 7px;
    vertical-align: middle;
}
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1>🎯 Smart Result Checker</h1>
        <div class="sub">
            BISE Sahiwal
            <span class="badge badge-green">🧠 Smart Wait</span>
            <span class="badge badge-cyan">⚡ 1-2s Burst</span>
        </div>
    </div>

    <div class="card">
        <div class="field">
            <label>Class</label>
            <select id="class">
                <option>9th</option>
                <option>10th</option>
            </select>
        </div>

        <div class="field">
            <label>Year</label>
            <select id="year">
                <option>2026</option>
                <option>2025</option>
                <option>2024</option>
            </select>
        </div>

        <div class="field">
            <label>Roll Number</label>
            <input type="text" id="roll" placeholder="6-digit roll number" maxlength="6" inputmode="numeric">
        </div>

        <button class="btn btn-primary" onclick="startAutoCheck()" id="startBtn">
            🎯 Start Smart Checker
        </button>
    </div>

    <div id="statusContainer"></div>
</div>

<script>
let currentJobId  = null;
let statusInterval = null;
let statusTimeout  = null;  // FIX #7: Timeout guard

// FIX #7: Reset interval with timeout safety
function startPolling() {
    if (statusInterval) clearInterval(statusInterval);
    if (statusTimeout)  clearTimeout(statusTimeout);

    statusInterval = setInterval(checkStatus, 1500);

    // Safety: if no response in 10s, reset interval to avoid zombie loops
    statusTimeout = setTimeout(() => {
        console.warn("Status check timed out — restarting poll");
        startPolling();
    }, 10000);
}

async function startAutoCheck() {
    const roll = document.getElementById('roll').value.trim();
    const cls  = document.getElementById('class').value;
    const year = document.getElementById('year').value;

    if (!roll)              { alert('Roll number daalen'); return; }
    if (!/^\d{6}$/.test(roll)) { alert('Roll number 6 digits ka hona chahiye'); return; }

    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Starting...';

    try {
        const res  = await fetch('/start-auto-check', {
            method:  'POST',
            headers: {'Content-Type': 'application/json'},
            body:    JSON.stringify({ roll, class: cls, year })
        });
        const data = await res.json();

        if (data.error) {
            alert('Error: ' + data.error);
            btn.disabled = false;
            btn.innerHTML = '🎯 Start Smart Checker';
            return;
        }

        currentJobId = data.job_id;
        btn.innerHTML = '🧠 Checker Active...';
        startPolling();

    } catch (err) {
        alert('Network error: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '🎯 Start Smart Checker';
    }
}

async function checkStatus() {
    if (!currentJobId) return;

    // Reset safety timeout on each successful attempt
    if (statusTimeout) clearTimeout(statusTimeout);
    statusTimeout = setTimeout(() => startPolling(), 10000);

    try {
        const res  = await fetch(`/check-status/${currentJobId}`);
        const data = await res.json();

        updateStatusUI(data);

        if (data.status === 'completed') {
            clearInterval(statusInterval);
            clearTimeout(statusTimeout);

            const btn = document.getElementById('startBtn');
            btn.disabled = false;
            btn.innerHTML = '🎯 Start Smart Checker';

            // FIX #8: Notification includes class + year
            if (Notification.permission === 'granted') {
                new Notification('✅ Result Mil Gaya!', {
                    body: `Roll #${data.roll} • ${data.cls} • ${data.year} result display ho gaya!`
                });
            }

            setTimeout(() => alert('🎉 RESULT MIL GAYA!\n\nResult upar display ho gaya hai!'), 400);
        }

        if (data.status === 'stopped' || data.status === 'error') {
            clearInterval(statusInterval);
            clearTimeout(statusTimeout);
            const btn = document.getElementById('startBtn');
            btn.disabled = false;
            btn.innerHTML = '🎯 Start Smart Checker';
        }

    } catch (err) {
        console.error('Status check error:', err);
    }
}

function updateStatusUI(data) {
    const container = document.getElementById('statusContainer');

    const pillClass = {
        waiting_for_result: 'pill-waiting',
        checking:           'pill-checking',
        completed:          'pill-done',
        stopped:            'pill-stopped',
    }[data.status] || 'pill-stopped';

    const pillLabel = {
        waiting_for_result: '⏳ WAITING',
        checking:           '⚡ FAST CHECKING',
        completed:          '✅ RESULT FOUND',
        stopped:            '⛔ STOPPED',
    }[data.status] || data.status.toUpperCase();

    let inner = '';

    if (data.status === 'waiting_for_result') {
        inner = `
            <div class="phase-center">
                <span class="big-icon">📡</span>
                <div class="phase-title">Waiting for ${data.year} result...</div>
                <div class="phase-sub">
                    Har 30 seconds mein BISE website check ho rahi hai<br>
                    Upload hotey hi automatically fast checking shuru!<br>
                    ⏱️ ${data.elapsed_time} elapsed
                </div>
            </div>
            <button class="btn btn-danger" onclick="stopAutoCheck()">⛔ Stop Waiting</button>
        `;

    } else if (data.status === 'checking') {
        inner = `
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-val">${data.attempts}</div>
                    <div class="stat-lbl">Attempts</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val">${data.elapsed_time}</div>
                    <div class="stat-lbl">Time</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val">${data.requests_per_minute || '—'}</div>
                    <div class="stat-lbl">Req/min</div>
                </div>
            </div>
            <div class="phase-center">
                <span class="big-icon" style="animation:spin 0.6s linear infinite;display:inline-block">⚡</span>
                <div class="phase-title">Fast Checking Active!</div>
                <div class="phase-sub">
                    3 parallel workers — har 0.3-0.5s mein check<br>
                    Combined speed: ~360-600 requests/min 🔥<br>
                    Result aate hi automatically show ho jaye ga 🎯
                </div>
            </div>
            <button class="btn btn-danger" onclick="stopAutoCheck()">⛔ Stop Checking</button>
        `;

    } else if (data.status === 'completed' && data.result) {
        const r = data.result;
        let items = '';

        (r.results || []).forEach((item, i) => {
            const delay = `animation-delay:${i * 0.05}s`;
            if (item.marks !== undefined) {
                items += `
                    <div class="result-item" style="${delay}">
                        <div class="subject">📚 ${item.subject}</div>
                        <div class="marks">Marks: <span>${item.marks}</span></div>
                    </div>`;
            } else {
                const parts = [];
                if (item.class9)    parts.push(`9th: <span>${item.class9}</span>`);
                if (item.class10)   parts.push(`10th: <span>${item.class10}</span>`);
                if (item.practical) parts.push(`Practical: <span>${item.practical}</span>`);
                items += `
                    <div class="result-item" style="${delay}">
                        <div class="subject">📚 ${item.subject}</div>
                        <div class="marks">${parts.join(' &nbsp;|&nbsp; ')} &nbsp;|&nbsp; Total: <span>${item.total}</span></div>
                    </div>`;
            }
        });

        inner = `
            <div class="result-list">${items}</div>
            ${r.total ? `<div class="total-box">📊 TOTAL MARKS: ${r.total}</div>` : ''}
            <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px">
                ✅ Found after ${r.attempts} attempts
            </div>
        `;

    } else if (data.status === 'stopped') {
        inner = `<div class="phase-center"><span class="big-icon">⛔</span>
            <div class="phase-title">Checker Stopped</div>
            <div class="phase-sub">Dobara start karne ke liye upar form bharein</div></div>`;
    }

    container.innerHTML = `
        <div class="status-card">
            <div class="status-top">
                <span class="status-pill ${pillClass}">${pillLabel}</span>
                ${data.status === 'checking' ? `<span class="attempt-num">#${data.attempts}</span>` : ''}
            </div>
            ${inner}
        </div>
    `;
}

async function stopAutoCheck() {
    if (!currentJobId) return;
    if (!confirm('Checking band kar dein?')) return;

    await fetch(`/stop-check/${currentJobId}`, { method: 'POST' });
    clearInterval(statusInterval);
    clearTimeout(statusTimeout);

    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').innerHTML = '🎯 Start Smart Checker';
    document.getElementById('statusContainer').innerHTML = '';
    currentJobId = null;
}

if ('Notification' in window) Notification.requestPermission();
</script>

<footer style="text-align:center; padding: 24px 0 8px; font-size: 12px; color: var(--muted); letter-spacing: 0.5px;">
    Created By &nbsp;<span style="color:var(--cyan); font-weight:700; font-family:'JetBrains Mono',monospace;">MUHAMMAD ABDULLAH</span>
</footer>

</body>
</html>
